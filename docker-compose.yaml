# Docker Compose for Agent Memory with Redis Stack
# Run: docker compose up -d
# Stop: docker compose down
# View logs: docker compose logs -f

services:
  redis:
    image: redis/redis-stack:latest
    container_name: agent-memory-redis
    ports:
      - "6379:6379"
      - "8001:8001"  # RedisInsight UI
    volumes:
      - redis_data:/data
    environment:
      - REDIS_ARGS=--maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  # Agent Memory MCP Server (optional - for containerized MCP usage)
  mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-memory-mcp
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AGENT_MEMORY_MODEL=fast
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./.env:/app/.env:ro
    profiles:
      - mcp  # Run with: docker compose --profile mcp up

volumes:
  redis_data:
    driver: local