<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" width="600" height="160">
  <defs>
    <!-- Animated gradient background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
      <animate attributeName="x1" values="0%;100%;0%" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="100%;0%;100%" dur="8s" repeatCount="indefinite"/>
    </linearGradient>
    
    <!-- Neon glow -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Redis gradient -->
    <linearGradient id="redisGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C6302B"/>
      <stop offset="100%" stop-color="#912626"/>
    </linearGradient>
    
    <!-- Cyan glow -->
    <radialGradient id="cyanGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Purple glow -->
    <radialGradient id="purpleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="160" fill="url(#bgGrad)"/>
  
  <!-- Animated glow orbs -->
  <circle cx="100" cy="40" r="60" fill="url(#cyanGlow)">
    <animate attributeName="cy" values="40;60;40" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="120" r="50" fill="url(#purpleGlow)">
    <animate attributeName="cy" values="120;90;120" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Floating particles -->
  <g fill="#8B5CF6" opacity="0.3">
    <circle cx="50" cy="80" r="2">
      <animate attributeName="cy" values="80;60;80" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="120" r="1.5">
      <animate attributeName="cy" values="120;90;120" dur="4s" repeatCount="indefinite" begin="0.5s"/>
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="4s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="250" cy="50" r="2">
      <animate attributeName="cy" values="50;80;50" dur="3.5s" repeatCount="indefinite" begin="1s"/>
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3.5s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle cx="350" cy="130" r="1.5">
      <animate attributeName="cy" values="130;100;130" dur="4.5s" repeatCount="indefinite" begin="0.3s"/>
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="4.5s" repeatCount="indefinite" begin="0.3s"/>
    </circle>
    <circle cx="450" cy="60" r="2">
      <animate attributeName="cy" values="60;40;60" dur="3s" repeatCount="indefinite" begin="0.8s"/>
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite" begin="0.8s"/>
    </circle>
    <circle cx="550" cy="100" r="1.5">
      <animate attributeName="cy" values="100;70;100" dur="4s" repeatCount="indefinite" begin="1.2s"/>
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="4s" repeatCount="indefinite" begin="1.2s"/>
    </circle>
  </g>
  
  <!-- Binary rain effect -->
  <g font-family="monospace" font-size="10" fill="#06B6D4" opacity="0.15">
    <text x="30" y="40">
      <animate attributeName="y" values="40;170;40" dur="12s" repeatCount="indefinite"/>1
    </text>
    <text x="80" y="80">
      <animate attributeName="y" values="80;170;80" dur="15s" repeatCount="indefinite" begin="3s"/>0
    </text>
    <text x="130" y="30">
      <animate attributeName="y" values="30;170;30" dur="10s" repeatCount="indefinite" begin="7s"/>1
    </text>
    <text x="470" y="50">
      <animate attributeName="y" values="50;170;50" dur="13s" repeatCount="indefinite" begin="2s"/>1
    </text>
    <text x="520" y="90">
      <animate attributeName="y" values="90;170;90" dur="11s" repeatCount="indefinite" begin="5s"/>0
    </text>
    <text x="570" y="40">
      <animate attributeName="y" values="40;170;40" dur="14s" repeatCount="indefinite" begin="9s"/>1
    </text>
  </g>
  
  <!-- Grid lines -->
  <g stroke="#8B5CF6" stroke-width="0.5" opacity="0.1">
    <line x1="0" y1="40" x2="600" y2="40"/>
    <line x1="0" y1="80" x2="600" y2="80"/>
    <line x1="0" y1="120" x2="600" y2="120"/>
    <line x1="150" y1="0" x2="150" y2="160"/>
    <line x1="300" y1="0" x2="300" y2="160"/>
    <line x1="450" y1="0" x2="450" y2="160"/>
  </g>
  
  <!-- Redis Logo (centered) -->
  <g transform="translate(268, 55) scale(0.35)" filter="url(#neonGlow)">
    <path d="M245.97 168.943c-13.662 7.121-84.434 36.22-99.501 44.075-15.067 7.856-23.437 7.78-35.34 2.09-11.902-5.69-87.216-36.112-100.783-42.597C3.566 169.271 0 166.535 0 163.951v-25.876s98.05-21.345 113.879-27.024c15.828-5.679 21.32-5.884 34.79-.95 13.472 4.936 94.018 19.468 107.331 24.344l-.006 25.51c.002 2.558-3.07 5.364-10.024 8.988" fill="#912626"/>
    <path d="M245.965 143.22c-13.661 7.118-84.431 36.218-99.498 44.072-15.066 7.857-23.436 7.78-35.338 2.09-11.903-5.686-87.214-36.113-100.78-42.594-13.566-6.485-13.85-10.948-.524-16.166 13.326-5.22 88.224-34.605 104.055-40.284 15.828-5.677 21.319-5.884 34.789-.948 13.471 4.934 83.819 32.935 97.13 37.81 13.316 4.881 13.827 8.9.166 16.02" fill="#C6302B"/>
    <path d="M245.97 127.074c-13.662 7.122-84.434 36.22-99.501 44.078-15.067 7.853-23.437 7.777-35.34 2.087-11.903-5.687-87.216-36.112-100.783-42.597C3.566 127.402 0 124.67 0 122.085V96.206s98.05-21.344 113.879-27.023c15.828-5.679 21.32-5.885 34.79-.95C162.142 73.168 242.688 87.697 256 92.574l-.006 25.513c.002 2.557-3.07 5.363-10.024 8.987" fill="#912626"/>
    <path d="M245.965 101.351c-13.661 7.12-84.431 36.218-99.498 44.075-15.066 7.854-23.436 7.777-35.338 2.087-11.903-5.686-87.214-36.112-100.78-42.594-13.566-6.483-13.85-10.947-.524-16.167C23.151 83.535 98.05 54.148 113.88 48.47c15.828-5.678 21.319-5.884 34.789-.949 13.471 4.934 83.819 32.933 97.13 37.81 13.316 4.88 13.827 8.9.166 16.02" fill="#C6302B"/>
    <path d="M245.97 83.653c-13.662 7.12-84.434 36.22-99.501 44.078-15.067 7.854-23.437 7.777-35.34 2.087-11.903-5.687-87.216-36.113-100.783-42.595C3.566 83.98 0 81.247 0 78.665v-25.88s98.05-21.343 113.879-27.021c15.828-5.68 21.32-5.884 34.79-.95C162.142 29.749 242.688 44.278 256 49.155l-.006 25.512c.002 2.555-3.07 5.361-10.024 8.986" fill="#912626"/>
    <path d="M245.965 57.93c-13.661 7.12-84.431 36.22-99.498 44.074-15.066 7.854-23.436 7.777-35.338 2.09C99.227 98.404 23.915 67.98 10.35 61.497-3.217 55.015-3.5 50.55 9.825 45.331 23.151 40.113 98.05 10.73 113.88 5.05c15.828-5.679 21.319-5.883 34.789-.948 13.471 4.935 83.819 32.934 97.13 37.811 13.316 4.876 13.827 8.897.166 16.017" fill="#C6302B"/>
    <path d="M159.283 32.757l-22.01 2.285-4.927 11.856-7.958-13.23-25.415-2.284 18.964-6.839-5.69-10.498 17.755 6.944 16.738-5.48-4.524 10.855 17.067 6.391M131.032 90.275L89.955 73.238l58.86-9.035-17.783 26.072M74.082 39.347c17.375 0 31.46 5.46 31.46 12.194 0 6.736-14.085 12.195-31.46 12.195s-31.46-5.46-31.46-12.195c0-6.734 14.085-12.194 31.46-12.194" fill="#FFF"/>
    <path d="M185.295 35.998l34.836 13.766-34.806 13.753-.03-27.52" fill="#621B1C"/>
    <path d="M146.755 51.243l38.54-15.245.03 27.519-3.779 1.478-34.791-13.752" fill="#9A2928"/>
  </g>
  
  <!-- Title -->
  <text x="300" y="130" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="#FFFFFF" text-anchor="middle" filter="url(#neonGlow)">
    Agent Memory
    <animate attributeName="opacity" values="0.9;1;0.9" dur="3s" repeatCount="indefinite"/>
  </text>
  
  <!-- Subtitle -->
  <text x="300" y="150" font-family="monospace" font-size="11" fill="#06B6D4" text-anchor="middle" opacity="0.8">
    Semantic memory for AI agents
  </text>
  
  <!-- Side accents -->
  <g stroke="#C6302B" stroke-width="2" opacity="0.6">
    <line x1="180" y1="75" x2="200" y2="75"/>
    <line x1="400" y1="75" x2="420" y2="75"/>
  </g>
  <g stroke="#8B5CF6" stroke-width="2" opacity="0.6">
    <line x1="180" y1="85" x2="195" y2="85"/>
    <line x1="405" y1="85" x2="420" y2="85"/>
  </g>
</svg>