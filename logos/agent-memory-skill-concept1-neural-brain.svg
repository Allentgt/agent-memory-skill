<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Brain outline -->
  <g id="brain">
    <path d="M100,30 Q140,30 160,60 Q180,90 170,120 Q160,150 130,165 Q100,180 70,165 Q40,150 30,120 Q20,90 40,60 Q60,30 100,30 Z" 
          fill="none" stroke="url(#grad1)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Neural connections -->
    <circle cx="70" cy="60" r="8" fill="#6366F1"/>
    <circle cx="100" cy="50" r="8" fill="#8B5CF6"/>
    <circle cx="130" cy="60" r="8" fill="#6366F1"/>
    <circle cx="60" cy="90" r="6" fill="#A78BFA"/>
    <circle cx="85" cy="80" r="6" fill="#6366F1"/>
    <circle cx="115" cy="80" r="6" fill="#8B5CF6"/>
    <circle cx="140" cy="90" r="6" fill="#A78BFA"/>
    <circle cx="75" cy="110" r="6" fill="#8B5CF6"/>
    <circle cx="100" cy="100" r="8" fill="#6366F1"/>
    <circle cx="125" cy="110" r="6" fill="#A78BFA"/>
    <circle cx="90" cy="130" r="5" fill="#6366F1"/>
    <circle cx="110" cy="130" r="5" fill="#8B5CF6"/>
    
    <!-- Connection lines -->
    <line x1="70" y1="60" x2="100" y2="50" stroke="#6366F1" stroke-width="2" opacity="0.5"/>
    <line x1="100" y1="50" x2="130" y2="60" stroke="#8B5CF6" stroke-width="2" opacity="0.5"/>
    <line x1="70" y1="60" x2="60" y2="90" stroke="#6366F1" stroke-width="2" opacity="0.5"/>
    <line x1="60" y1="90" x2="85" y2="80" stroke="#A78BFA" stroke-width="2" opacity="0.5"/>
    <line x1="85" y1="80" x2="100" y2="50" stroke="#6366F1" stroke-width="2" opacity="0.5"/>
    <line x1="85" y1="80" x2="100" y2="100" stroke="#6366F1" stroke-width="2" opacity="0.5"/>
    <line x1="100" y1="100" x2="115" y2="80" stroke="#8B5CF6" stroke-width="2" opacity="0.5"/>
    <line x1="115" y1="80" x2="140" y2="90" stroke="#A78BFA" stroke-width="2" opacity="0.5"/>
    <line x1="100" y1="100" x2="75" y2="110" stroke="#6366F1" stroke-width="2" opacity="0.5"/>
    <line x1="75" y1="110" x2="100" y2="100" stroke="#8B5CF6" stroke-width="2" opacity="0.5"/>
    <line x1="100" y1="100" x2="125" y2="110" stroke="#6366F1" stroke-width="2" opacity="0.5"/>
    <line x1="125" y1="110" x2="140" y2="90" stroke="#A78BFA" stroke-width="2" opacity="0.5"/>
    <line x1="75" y1="110" x2="90" y2="130" stroke="#8B5CF6" stroke-width="2" opacity="0.5"/>
    <line x1="90" y1="130" x2="100" y2="100" stroke="#6366F1" stroke-width="2" opacity="0.5"/>
    <line x1="100" y1="100" x2="110" y2="130" stroke="#8B5CF6" stroke-width="2" opacity="0.5"/>
    <line x1="110" y1="130" x2="125" y2="110" stroke="#A78BFA" stroke-width="2" opacity="0.5"/>
  </g>
</svg>