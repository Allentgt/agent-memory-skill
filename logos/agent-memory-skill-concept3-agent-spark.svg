<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EF4444;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- AI Brain silhouette -->
  <ellipse cx="100" cy="100" rx="55" ry="50" fill="none" stroke="#F59E0B" stroke-width="4" opacity="0.6"/>
  
  <!-- Inner brain shape -->
  <path d="M100,60 Q130,60 145,85 Q160,110 150,135 Q140,160 115,165 Q100,170 85,165 Q60,160 50,135 Q40,110 55,85 Q70,60 100,60 Z" 
        fill="none" stroke="url(#grad3)" stroke-width="5" stroke-linecap="round"/>
  
  <!-- Central spark/light -->
  <circle cx="100" cy="105" r="15" fill="url(#grad3)"/>
  
  <!-- Spark rays -->
  <g stroke="#F59E0B" stroke-width="3" stroke-linecap="round">
    <line x1="100" y1="40" x2="100" y2="55"/>
    <line x1="100" y1="150" x2="100" y2="165"/>
    <line x1="55" y1="90" x2="65" y2="100"/>
    <line x1="145" y1="90" x2="135" y2="100"/>
    <line x1="55" y1="120" x2="65" y2="110"/>
    <line x1="145" y1="120" x2="135" y2="110"/>
  </g>
  
  <!-- Small accent dots representing data -->
  <circle cx="75" cy="75" r="5" fill="#F59E0B"/>
  <circle cx="125" cy="75" r="5" fill="#EF4444"/>
  <circle cx="70" cy="130" r="4" fill="#EF4444"/>
  <circle cx="130" cy="130" r="4" fill="#F59E0B"/>
</svg>