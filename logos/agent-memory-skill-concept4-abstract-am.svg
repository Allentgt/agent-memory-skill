<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EC4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Letter A - neural network style -->
  <g id="letter-a">
    <path d="M50,160 L85,50 L120,160" stroke="url(#grad4)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M65,115 L105,115" stroke="url(#grad4)" stroke-width="6" stroke-linecap="round"/>
    
    <!-- Neural nodes on A -->
    <circle cx="50" cy="160" r="6" fill="#EC4899"/>
    <circle cx="85" cy="50" r="8" fill="#8B5CF6"/>
    <circle cx="120" cy="160" r="6" fill="#EC4899"/>
    <circle cx="75" cy="105" r="5" fill="#8B5CF6"/>
    <circle cx="95" cy="105" r="5" fill="#EC4899"/>
  </g>
  
  <!-- Letter M - neural network style -->
  <g id="letter-m">
    <path d="M155,160 L155,80 L175,110 L195,80 L195,160" stroke="url(#grad4)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    
    <!-- Neural nodes on M -->
    <circle cx="155" cy="160" r="6" fill="#EC4899"/>
    <circle cx="155" cy="80" r="6" fill="#8B5CF6"/>
    <circle cx="175" cy="110" r="8" fill="#EC4899"/>
    <circle cx="195" cy="80" r="6" fill="#8B5CF6"/>
    <circle cx="195" cy="160" r="6" fill="#EC4899"/>
  </g>
  
  <!-- Connection lines between letters -->
  <line x1="120" y1="160" x2="155" y2="160" stroke="url(#grad4)" stroke-width="3" stroke-dasharray="5,5" opacity="0.5"/>
  
  <!-- Neural pulse effect -->
  <circle cx="140" cy="130" r="4" fill="#EC4899" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="145" cy="145" r="3" fill="#8B5CF6" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
</svg>