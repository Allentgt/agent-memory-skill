<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="redisGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC382D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9B1C23;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="flowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DC382D;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Redis-style cube outline -->
  <g id="redis-cube">
    <!-- Front face -->
    <rect x="50" y="60" width="100" height="80" rx="8" fill="none" stroke="url(#redisGrad)" stroke-width="5"/>
    
    <!-- 3D depth effect -->
    <path d="M50,60 L65,45 L165,45 L150,60" fill="none" stroke="#DC382D" stroke-width="4" opacity="0.6"/>
    <path d="M165,45 L165,60" fill="none" stroke="#DC382D" stroke-width="4" opacity="0.8"/>
    
    <!-- Redis "R" or key pattern -->
    <g fill="#DC382D" opacity="0.9">
      <!-- Key icon -->
      <circle cx="75" cy="85" r="6"/>
      <rect x="72" y="91" width="8" height="30" rx="2"/>
      <rect x="77" y="108" width="12" height="4" rx="1"/>
      <rect x="77" y="116" width="8" height="4" rx="1"/>
    </g>
  </g>
  
  <!-- Flowing data streams INTO Redis -->
  <g id="data-flow">
    <!-- Left inflow (cyan) -->
    <path d="M20,70 Q35,70 40,85 Q45,100 50,100" 
          stroke="#06B6D4" stroke-width="4" fill="none" stroke-linecap="round">
      <animate attributeName="stroke-dasharray" values="0,80;80,0" dur="1.5s" repeatCount="indefinite"/>
    </path>
    <path d="M20,100 Q35,100 40,90" 
          stroke="#06B6D4" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.5"/>
    <path d="M20,130 Q35,130 40,115 Q45,100 50,110" 
          stroke="#06B6D4" stroke-width="4" fill="none" stroke-linecap="round">
      <animate attributeName="stroke-dasharray" values="0,80;80,0" dur="1.5s" repeatCount="indefinite" begin="0.3s"/>
    </path>
    
    <!-- Purple processing in middle -->
    <path d="M150,100 L165,100" stroke="#8B5CF6" stroke-width="4" stroke-linecap="round" stroke-dasharray="5,3">
      <animate attributeName="stroke-dashoffset" values="0;-16" dur="1s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Outflow (processed data) -->
  <g id="outflow">
    <path d="M150,80 L170,80 Q180,80 180,100 Q180,120 170,120" 
          stroke="#8B5CF6" stroke-width="4" fill="none" stroke-linecap="round">
      <animate attributeName="stroke-dasharray" values="0,60;60,0" dur="1.5s" repeatCount="indefinite"/>
    </path>
    <path d="M150,120 L170,120 Q180,120 180,100" 
          stroke="#DC382D" stroke-width="4" fill="none" stroke-linecap="round">
      <animate attributeName="stroke-dasharray" values="0,60;60,0" dur="1.5s" repeatCount="indefinite" begin="0.5s"/>
    </path>
  </g>
  
  <!-- Animated processing dots -->
  <circle cx="65" cy="100" r="5" fill="#DC382D">
    <animate attributeName="r" values="5;3;5" dur="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="75" r="4" fill="#8B5CF6">
    <animate attributeName="r" values="4;6;4" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="125" r="4" fill="#06B6D4">
    <animate attributeName="r" values="4;6;4" dur="1.2s" repeatCount="indefinite" begin="0.6s"/>
  </circle>
  
  <!-- Redis brand accent -->
  <text x="85" y="108" font-family="monospace" font-size="10" font-weight="bold" fill="#DC382D">R</text>
  
  <!-- Arrow indicators -->
  <g stroke="#06B6D4" stroke-width="2" opacity="0.7">
    <path d="M25,75 L30,75 L27,72 M27,78" />
  </g>
  <g stroke="#DC382D" stroke-width="2" opacity="0.7">
    <path d="M175,125 L170,125 L173,122 M173,128" />
  </g>
</svg>